name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# cancel older runs of the same ref/PR
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  CI: "true"

jobs:
  # (No job here; just comments to keep the file readable.)

  # ----- 1) Lint -----
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: ESLint
        run: npm run lint

  # ----- 2) Format check (Prettier) -----
  format:
    name: Format (Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install deps
        run: npm install

      - name: Prettier check
        run: npm run prettier:check

  # ----- 5) Build Next.js -----
  build:
    name: Build (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install deps
        run: npm install

      - name: Next.js build
        run: npm run build
